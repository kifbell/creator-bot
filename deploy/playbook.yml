---
- name: Deploy AI Creator Bot
  hosts: bot
  gather_facts: true

  vars:
    app_dir: ~/dev/creator-bot
    repo_url: https://github.com/kifbell/creator-bot.git
    branch: main
    bot_env: test
    service_name: creator-bot

  tasks:
    - name: Install system packages
      become: true
      apt:
        name:
          - python3
          - python3-venv
          - python3-pip
          - git
        state: present
        update_cache: true

    - name: Clone or update repo
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: "{{ branch }}"
        force: true

    - name: Create virtualenv and install dependencies
      pip:
        requirements: "{{ app_dir }}/requirements.txt"
        virtualenv: "{{ app_dir }}/.venv"
        virtualenv_command: python3 -m venv

    - name: Copy .env file to server
      copy:
        src: ../.env
        dest: "{{ app_dir }}/.env"
        mode: "0600"

    - name: Deploy systemd service file
      become: true
      template:
        src: creator-bot.service
        dest: /etc/systemd/system/{{ service_name }}.service
      notify: Reload systemd

    - name: Set BOT_ENV in service file
      become: true
      lineinfile:
        path: /etc/systemd/system/{{ service_name }}.service
        regexp: "^Environment=BOT_ENV="
        line: "Environment=BOT_ENV={{ bot_env }}"
      notify: Reload systemd

    - name: Flush handlers
      meta: flush_handlers

    - name: Restart bot
      become: true
      systemd:
        name: "{{ service_name }}"
        state: restarted
        enabled: true

    - name: Verify bot is running
      become: true
      systemd:
        name: "{{ service_name }}"
      register: bot_status

    - name: Show status
      debug:
        msg: "{{ service_name }} is {{ bot_status.status.ActiveState }}, PID {{ bot_status.status.MainPID }}"

  handlers:
    - name: Reload systemd
      become: true
      systemd:
        daemon_reload: true
